name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (Ninja)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl -DCMAKE_RC_COMPILER=rc -DCMAKE_CXX_FLAGS="/W4 /WX-"

      - name: Build (Release)
        run: cmake --build build --parallel

      - name: Collect artifact files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          $gui = Get-ChildItem -Recurse -Path build -Filter Rbpo_pz_6sem.exe | Select-Object -First 1
          $svc = Get-ChildItem -Recurse -Path build -Filter RbpoPz6SemService.exe | Select-Object -First 1
          if (-not $gui) { throw "Rbpo_pz_6sem.exe was not found" }
          if (-not $svc) { throw "RbpoPz6SemService.exe was not found" }
          Copy-Item $gui.FullName artifact/
          Copy-Item $svc.FullName artifact/
          Get-ChildItem $gui.Directory.FullName -Filter *.dll | ForEach-Object { Copy-Item $_.FullName artifact/ }
          $guiDataPath = Join-Path $gui.Directory.FullName 'data'
          if (Test-Path $guiDataPath) {
            $artifactDataPath = Join-Path 'artifact' 'data'
            Copy-Item -Recurse $guiDataPath $artifactDataPath
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: artifact

      - name: Setup WiX and prerequisites
        shell: pwsh
        run: |
          choco install wixtoolset -y
          New-Item -ItemType Directory -Path tools\installer\prereqs -Force | Out-Null
          Invoke-WebRequest -Uri https://aka.ms/vs/17/release/vc_redist.x64.exe -OutFile tools\installer\prereqs\VC_redist.x64.exe

      - name: Build MSI installer
        shell: pwsh
        run: |
          # harvest files from artifact
          & "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin\heat.exe" dir artifact -cg AppFiles -dr INSTALLFOLDER -scom -sreg -sfrag -gg -out tools\installer\harvested.wxs
          & "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin\candle.exe" tools\installer\product.wxs tools\installer\harvested.wxs -outdir tools\installer
          & "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin\light.exe" tools\installer\product.wixobj tools\installer\harvested.wixobj -ext WixUtilExtension -out tools\installer\RbpoPzInstaller.msi

      - name: Build Bundle
        shell: pwsh
        run: |
          # produce bundle exe that chains VC redist and MSI
          & "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin\candle.exe" tools\installer\bundle.wxs -outdir tools\installer
          & "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin\light.exe" tools\installer\bundle.wixobj -ext WixBalExtension -out tools\installer\RbpoPzInstaller.exe

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer
          path: tools/installer
