name: build

on:
  push:
    branches: [ "main", "pzz2", "pz3" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (Ninja)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl -DCMAKE_RC_COMPILER=rc -DCMAKE_CXX_FLAGS="/W4 /WX-"

      - name: Build (Release)
        run: cmake --build build --parallel

      - name: Collect artifact files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          $gui = Get-ChildItem -Recurse -Path build -Filter Rbpo_pz_6sem.exe | Select-Object -First 1
          $svc = Get-ChildItem -Recurse -Path build -Filter RbpoPz6SemService.exe | Select-Object -First 1
          if (-not $gui) { throw "Rbpo_pz_6sem.exe was not found" }
          if (-not $svc) { throw "RbpoPz6SemService.exe was not found" }
          Copy-Item $gui.FullName artifact/
          Copy-Item $svc.FullName artifact/
          Get-ChildItem $gui.Directory.FullName -Filter *.dll | ForEach-Object { Copy-Item $_.FullName artifact/ }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: artifact
