name: build

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure CMake (Ninja)
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_CXX_COMPILER=cl -DCMAKE_RC_COMPILER=rc

      - name: Build (Release)
        run: cmake --build build --parallel

      - name: Collect artifact files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifact -Force | Out-Null
          $exe = Get-ChildItem -Recurse -Path build -Filter Rbpo_pz_6sem.exe | Select-Object -First 1
          if (-not $exe) { throw "exe file was not found" }
          Copy-Item $exe.FullName artifact/
          Get-ChildItem $exe.Directory.FullName -Filter *.dll | ForEach-Object { Copy-Item $_.FullName artifact/ }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: artifact
